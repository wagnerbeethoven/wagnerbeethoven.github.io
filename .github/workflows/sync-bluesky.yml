name: Sync Bluesky posts

on:
  schedule:
    # Roda a cada 6 horas (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: "0 */6 * * *"
  workflow_dispatch: # permite rodar manualmente pelo GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Sync Bluesky posts
        run: node scripts/sync-bluesky.js

      - name: Commit novas notas
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/notes/
          if git diff --staged --quiet; then
            echo "Nenhuma nota nova para commitar."
          else
            COUNT=$(git diff --staged --name-only | wc -l)
            git commit -m "sync(bluesky): importa ${COUNT} nota(s) nova(s)"
            git push
          fi
